<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyoni - Connexion</title>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Ta feuille de style principale -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- BARRE DE NAVIGATION -->
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <a href="index.html"><strong>Nyoni 🇬🇦</strong></a>
            </div>
            <div class="header-actions">
                <nav class="nav-bar">
                    <a href="index.html">Accueil</a>
                </nav>
                <a href="index.html" class="cart-icon-btn">
                    <i class="fas fa-arrow-left"></i> Retour
                </a>
            </div>
        </div>
    </header>

    <!-- CONTAINER DE CONNEXION PRINCIPAL -->
    <div class="auth-wrapper">
        <div class="auth-container">
            
            <!-- Onglets modernes pour switcher de profil -->
            <div class="auth-tabs">
                <div id="tab-client" class="auth-tab active" onclick="choisirProfil('client')">
                    <i class="fas fa-user"></i>
                    <span>Espace Client</span>
                </div>
                <div id="tab-fournisseur" class="auth-tab" onclick="choisirProfil('fournisseur')">
                    <i class="fas fa-store"></i>
                    <span>Fournisseur</span>
                </div>
            </div>

            <!-- En-tête dynamique du formulaire -->
            <div class="auth-header">
                <h1 id="auth-title">Espace Client</h1>
                <p id="auth-subtitle">Connectez-vous pour commander les produits de nos provinces</p>
            </div>

            <!-- Zone de message d'erreur dynamique -->
            <div class="error-message" id="error-box">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text">Identifiants incorrects.</span>
            </div>

            <!-- Formulaire épuré -->
            <form id="login-form" onsubmit="gererConnexion(event)">
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required placeholder="exemple@nyoni.ga">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">Se connecter comme Client</button>
            </form>

            <!-- Pied de formulaire pour l'inscription -->
            <div class="auth-footer">
                <p>Vous n'avez pas encore de compte ? <a href="inscription.html">Créer un compte</a></p>
            </div>
        </div>
    </div>

    <!-- PIED DE PAGE -->
    <footer class="main-footer">
        <div class="footer-bottom">
            &copy; 2026 Nyoni Platform - Tous droits réservés.
        </div>
    </footer>

    <!-- Script de logique -->
    <script src="login.js"></script>
</body>
</html>
