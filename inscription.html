<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyoni - Créer un compte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="inscription.css"> 
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        
        <div class="auth-header">
          <div class="auth-logo">🐝</div>
          <h1 id="auth-title">Créer un compte Client</h1>
          <p id="auth-subtitle">Découvrez et commandez les trésors de notre terroir forestier</p>
        </div>

        <div class="auth-tabs">
          <button class="tab-btn active" id="tab-client" onclick="changerProfilInscription('client')">
            <i class="fas fa-shopping-basket"></i> Compte Client
          </button>
          <button class="tab-btn" id="tab-fournisseur" onclick="changerProfilInscription('fournisseur')">
            <i class="fas fa-store"></i> Distributeur / Collecteur
          </button>
        </div>

        <form id="register-form" onsubmit="gererInscription(event)">
          
          <div class="form-group">
            <label id="label-nom" for="reg-nom">Nom complet *</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="reg-nom" required placeholder="Ex: Jean Junior">
            </div>
          </div>

          <div class="form-group">
            <label for="reg-email">Adresse Email *</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="reg-email" required placeholder="Ex: junior@nyoni.ga">
            </div>
          </div>

          <div class="form-group" id="group-localisation">
            <label id="label-loc" for="reg-loc">Votre Province / Ville *</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-map-marker-alt input-icon"></i>
              <input type="text" id="reg-loc" required placeholder="Ex: Estuaire (Bikélé)">
            </div>
          </div>

          <div class="form-group">
            <label for="reg-pass">Mot de passe *</label>
            <div class="input-icon-wrapper">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="reg-pass" required placeholder="••••••••">
            </div>
          </div>

          <button type="submit" class="btn-auth" id="btn-submit-text">
            <i class="fas fa-user-plus"></i> Créer mon compte Client
          </button>
        </form>

        <div class="auth-footer">
          <p>Vous avez déjà un compte ? <a href="login.html">Connectez-vous ici</a></p>
          <p style="margin-top: 15px;">
            <a href="index.html" style="color: var(--muted); text-decoration: none;">
              <i class="fas fa-arrow-left"></i> Retour au site
            </a>
          </p>
        </div>

      </div>
    </div>
  </div>

  <script src="inscription.js"></script>
</body>
</html>
